<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#5c6bc0"/>
    </linearGradient>
    <linearGradient id="envelopeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="500" r="100" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="50" r="60" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main envelope -->
  <path d="M400 200 L600 350 L800 200 L800 450 L400 450 Z" fill="url(#envelopeGrad)" opacity="0.95"/>
  <path d="M400 200 L600 350 L800 200" fill="none" stroke="#2563eb" strokeWidth="4"/>
  
  <!-- Envelope flap -->
  <path d="M400 200 L600 350 L800 200" fill="#e3f2fd" opacity="0.8"/>
  
  <!-- Letter inside -->
  <rect x="450" y="280" width="300" height="150" rx="5" fill="white"/>
  <rect x="470" y="300" width="150" height="15" rx="3" fill="#2563eb"/>
  <rect x="470" y="325" width="200" height="10" rx="3" fill="#90a4ae"/>
  <rect x="470" y="345" width="180" height="10" rx="3" fill="#90a4ae"/>
  <rect x="470" y="365" width="220" height="10" rx="3" fill="#90a4ae"/>
  <rect x="470" y="385" width="160" height="10" rx="3" fill="#90a4ae"/>
  
  <!-- Location pins -->
  <g transform="translate(200, 250)">
    <path d="M0 0 L0 -30" stroke="#f44336" strokeWidth="4"/>
    <circle cx="0" cy="-40" r="12" fill="#f44336"/>
    <circle cx="0" cy="-40" r="6" fill="white"/>
  </g>
  
  <g transform="translate(1000, 250)">
    <path d="M0 0 L0 -30" stroke="#f44336" strokeWidth="4"/>
    <circle cx="0" cy="-40" r="12" fill="#f44336"/>
    <circle cx="0" cy="-40" r="6" fill="white"/>
  </g>
  
  <!-- Phone icons -->
  <g transform="translate(150, 400)">
    <rect x="-20" y="-40" width="40" height="80" rx="8" fill="#546e7a"/>
    <rect x="-15" y="-35" width="30" height="60" rx="5" fill="#e3f2fd"/>
    <circle cx="0" cy="20" r="5" fill="#78909c"/>
  </g>
  
  <g transform="translate(1050, 400)">
    <rect x="-20" y="-40" width="40" height="80" rx="8" fill="#546e7a"/>
    <rect x="-15" y="-35" width="30" height="60" rx="5" fill="#e3f2fd"/>
    <circle cx="0" cy="20" r="5" fill="#78909c"/>
  </g>
  
  <!-- Chat bubbles -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="80" height="50" rx="10" fill="#4caf50"/>
    <polygon points="10,50 20,60 30,50" fill="#4caf50"/>
    <rect x="10" y="10" width="40" height="8" rx="2" fill="white"/>
    <rect x="10" y="22" width="60" height="8" rx="2" fill="white"/>
    <rect x="10" y="34" width="30" height="8" rx="2" fill="white"/>
  </g>
  
  <g transform="translate(820, 150)">
    <rect x="0" y="0" width="80" height="50" rx="10" fill="#2196f3"/>
    <polygon points="70,50 60,60 50,50" fill="#2196f3"/>
    <rect x="10" y="10" width="40" height="8" rx="2" fill="white"/>
    <rect x="10" y="22" width="60" height="8" rx="2" fill="white"/>
    <rect x="10" y="34" width="30" height="8" rx="2" fill="white"/>
  </g>
  
  <!-- Floating elements -->
  <circle cx="150" cy="150" r="20" fill="#e3f2fd" opacity="0.8"/>
  <circle cx="1050" cy="150" r="25" fill="#e8f5e9" opacity="0.8"/>
  <circle cx="150" cy="450" r="15" fill="#fff3e0" opacity="0.8"/>
  <circle cx="1050" cy="450" r="20" fill="#fce4ec" opacity="0.8"/>
  
  <!-- Text -->
  <text x="600" y="550" textAnchor="middle" fill="white" fontSize="24" fontWeight="bold" fontFamily="Arial">Get in Touch With Us</text>
</svg>
