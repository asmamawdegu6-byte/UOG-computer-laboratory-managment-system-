<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#5c6bc0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="500" r="100" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="50" r="60" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main computer -->
  <rect x="400" y="150" width="400" height="300" rx="20" fill="url(#cardGrad)" opacity="0.95"/>
  <rect x="420" y="170" width="360" height="200" rx="10" fill="#e3f2fd"/>
  
  <!-- Screen content -->
  <rect x="440" y="190" width="150" height="20" rx="5" fill="#2563eb"/>
  <rect x="440" y="220" width="200" height="10" rx="3" fill="#90a4ae"/>
  <rect x="440" y="240" width="180" height="10" rx="3" fill="#90a4ae"/>
  <rect x="440" y="260" width="220" height="10" rx="3" fill="#90a4ae"/>
  <rect x="440" y="280" width="160" height="10" rx="3" fill="#90a4ae"/>
  
  <!-- Keyboard -->
  <rect x="450" y="380" width="300" height="50" rx="8" fill="#546e7a"/>
  <rect x="460" y="390" width="280" height="30" rx="5" fill="#78909c"/>
  
  <!-- Mouse -->
  <ellipse cx="800" cy="400" rx="25" ry="35" fill="#546e7a"/>
  <ellipse cx="800" cy="395" rx="20" ry="25" fill="#78909c"/>
  
  <!-- People icons -->
  <circle cx="200" cy="300" r="30" fill="#3f51b5"/>
  <rect x="170" y="340" width="60" height="80" rx="15" fill="#3f51b5"/>
  
  <circle cx="1000" cy="300" r="30" fill="#009688"/>
  <rect x="970" y="340" width="60" height="80" rx="15" fill="#009688"/>
  
  <circle cx="600" cy="450" r="30" fill="#ff5722"/>
  <rect x="570" y="490" width="60" height="80" rx="15" fill="#ff5722"/>
  
  <!-- Network lines -->
  <line x1="230" y1="300" x2="400" y2="250" stroke="#2196f3" strokeWidth="3" strokeDasharray="8,4"/>
  <line x1="970" y1="300" x2="800" y2="250" stroke="#2196f3" strokeWidth="3" strokeDasharray="8,4"/>
  <line x1="600" y1="450" x2="600" y2="380" stroke="#2196f3" strokeWidth="3" strokeDasharray="8,4"/>
  
  <!-- Floating elements -->
  <circle cx="150" cy="150" r="20" fill="#e3f2fd" opacity="0.8"/>
  <circle cx="1050" cy="150" r="25" fill="#e8f5e9" opacity="0.8"/>
  <circle cx="150" cy="450" r="15" fill="#fff3e0" opacity="0.8"/>
  <circle cx="1050" cy="450" r="20" fill="#fce4ec" opacity="0.8"/>
  
  <!-- Text -->
  <text x="600" y="550" textAnchor="middle" fill="white" fontSize="24" fontWeight="bold" fontFamily="Arial">Computer Lab Management Services</text>
</svg>
